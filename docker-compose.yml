version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: gamevault-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gamevault
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: gamevault-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  mysqldata:
